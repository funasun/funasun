<!DOCTYPE html>
<html lang="ja">
<head>
{{HEAD}}
</head>
<body class="p-research">
<div id="top"></div>
{{NAV}}

<main>
<header style="padding: 20vh 7vw 10vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box">
  <p data-reveal style="margin: 0 0 18px; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45); opacity: calc(var(--r, 0)); transition: opacity 1s ease"><span style="color: var(--accent, #6f8cff)">01</span> — Research 研究</p>
  <h1 data-reveal style="margin: 0 0 26px; font: 600 clamp(34px, 4.4vw, 62px)/1.5 'Noto Serif JP', serif; letter-spacing: .04em; text-wrap: pretty; opacity: calc(var(--r, 0)); transform: translateY(calc((1 - var(--r, 0)) * 24px)); transition: opacity 1.1s ease .1s, transform 1.1s ease .1s">廃棄物を資源へ。<br>地域から世界のエネルギー問題へ。</h1>
  <p data-reveal style="margin: 0; font: 300 15px/2.2 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.68); max-width: 620px; opacity: calc(var(--r, 0)); transition: opacity 1.2s ease .25s">{{RESEARCH_PROBLEM}}</p>
</header>

<section style="padding: 0 7vw 12vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box">
  <div data-m="statcol" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 22px">
{{STAT_CARDS}}
  </div>
</section>

<section data-m="stack" style="padding: 0 7vw 12vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box; display: grid; grid-template-columns: 7fr 5fr; gap: 60px; align-items: start">
  <div style="display: flex; flex-direction: column; gap: 34px">
{{STORY_PARAS}}
  </div>
  <div data-reveal data-m="poster" style="position: sticky; top: 80px; aspect-ratio: 1600 / 2262; width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,.12); opacity: calc(var(--r, 0)); transform: translateY(calc((1 - var(--r, 0)) * 30px)); transition: opacity 1.2s ease .15s, transform 1.2s ease .15s">
    <img src="images/poster.webp" alt="研究ポスター: 廃棄うどんを用いた高効率水素生成プロセスの設計と最適化" style="width: 100%; height: 100%; object-fit: cover; background: #0a0a0e" loading="lazy">
  </div>
</section>

<section style="padding: 0 7vw 12vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box">
  <p data-reveal style="margin: 0 0 40px; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45); opacity: calc(var(--r, 0)); transition: opacity 1s ease">Process — 変換の流れ</p>
  <div data-m="vflow" style="display: flex; align-items: center; gap: clamp(12px, 2vw, 24px); flex-wrap: wrap">
    <div data-reveal style="flex: 1; min-width: 180px; padding: 28px 26px; border: 1px solid rgba(255,255,255,.14); border-radius: 16px; text-align: center; opacity: calc(var(--r, 0)); transform: translateX(calc((1 - var(--r, 0)) * -30px)); transition: opacity .9s ease, transform .9s ease">
      <p style="margin: 0 0 6px; font: 500 17px 'Noto Serif JP', serif">廃棄うどん</p>
      <p style="margin: 0; font: 300 12px/1.7 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5)">年間 3,000トン超のバイオマス</p>
    </div>
    <span data-reveal data-m="varrow" style="font: 400 22px 'EB Garamond', serif; color: var(--accent, #6f8cff); opacity: calc(var(--r, 0)); transition: opacity 1.2s ease .3s">→</span>
    <div data-reveal style="flex: 1.2; min-width: 200px; padding: 28px 26px; border: 1px solid rgba(111,140,255,.4); border-radius: 16px; text-align: center; background: radial-gradient(120% 140% at 50% 120%, rgba(111,140,255,.12), transparent 60%); opacity: calc(var(--r, 0)); transform: translateY(calc((1 - var(--r, 0)) * 24px)); transition: opacity .9s ease .2s, transform .9s ease .2s">
      <p style="margin: 0 0 6px; font: 500 17px 'Noto Serif JP', serif">高効率生成プロセス</p>
      <p style="margin: 0; font: 300 12px/1.7 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5)">反応条件・収率・経済性を体系的に最適化</p>
    </div>
    <span data-reveal data-m="varrow" style="font: 400 22px 'EB Garamond', serif; color: var(--accent, #6f8cff); opacity: calc(var(--r, 0)); transition: opacity 1.2s ease .5s">→</span>
    <div style="flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 10px">
      <div data-reveal style="padding: 14px 20px; border: 1px solid rgba(255,255,255,.14); border-radius: 12px; display: flex; justify-content: space-between; align-items: baseline; opacity: calc(var(--r, 0)); transform: translateX(calc((1 - var(--r, 0)) * 30px)); transition: opacity .9s ease .4s, transform .9s ease .4s"><span style="font: 500 15px 'Noto Serif JP', serif">水素</span><span style="font: italic 400 12px 'EB Garamond', serif; color: rgba(244,244,245,.5)">H₂</span></div>
      <div data-reveal style="padding: 14px 20px; border: 1px solid rgba(255,255,255,.14); border-radius: 12px; display: flex; justify-content: space-between; align-items: baseline; opacity: calc(var(--r, 0)); transform: translateX(calc((1 - var(--r, 0)) * 30px)); transition: opacity .9s ease .55s, transform .9s ease .55s"><span style="font: 500 15px 'Noto Serif JP', serif">SAF</span><span style="font: italic 400 12px 'EB Garamond', serif; color: rgba(244,244,245,.5)">持続可能な航空燃料</span></div>
      <div data-reveal style="padding: 14px 20px; border: 1px solid rgba(255,255,255,.14); border-radius: 12px; display: flex; justify-content: space-between; align-items: baseline; opacity: calc(var(--r, 0)); transform: translateX(calc((1 - var(--r, 0)) * 30px)); transition: opacity .9s ease .7s, transform .9s ease .7s"><span style="font: 500 15px 'Noto Serif JP', serif">ナフサ</span><span style="font: italic 400 12px 'EB Garamond', serif; color: rgba(244,244,245,.5)">化学原料</span></div>
    </div>
  </div>
  <div data-reveal style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 40px; opacity: calc(var(--r, 0)); transition: opacity 1s ease">
{{KEYWORD_CHIPS}}
  </div>
</section>

<section style="padding: 0 7vw 14vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box">
  <div data-reveal style="display: flex; align-items: baseline; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 26px; opacity: calc(var(--r, 0)); transition: opacity 1s ease">
    <p style="margin: 0; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45)">Awards &amp; Activities</p>
    <a href="archive.html" style="font: 400 14px 'Noto Sans JP', sans-serif; letter-spacing: .1em; color: var(--accent, #6f8cff); text-decoration: none">記事で読む　→</a>
  </div>
  <div style="display: flex; flex-direction: column">
{{AWARD_ROWS}}
  </div>
</section>
</main>

{{FOOTER}}
<script src="js/site.js"></script>
</body>
</html>

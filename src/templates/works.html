<!DOCTYPE html>
<html lang="ja">
<head>
{{HEAD}}
</head>
<body class="p-works">
<div id="top"></div>
{{NAV}}

<header style="padding: 20vh 7vw 6vh; max-width: 1180px; margin: 0 auto; box-sizing: border-box">
  <p data-reveal style="margin: 0 0 18px; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45); opacity: calc(var(--r, 0)); transition: opacity 1s ease">Works — 開発</p>
  <h1 data-reveal style="margin: 0 0 22px; font: 600 clamp(40px, 5vw, 72px)/1.3 'Noto Serif JP', serif; letter-spacing: .06em; opacity: calc(var(--r, 0)); transform: translateY(calc((1 - var(--r, 0)) * 24px)); transition: opacity 1.1s ease .1s, transform 1.1s ease .1s">開発したアプリとゲーム一覧<span style="color: var(--accent, #6f8cff)">。</span></h1>
  <p data-reveal style="margin: 0; font: 300 15px/2 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.6); opacity: calc(var(--r, 0)); transition: opacity 1.2s ease .2s">個人で開発した Web アプリとゲーム。『小学生でもわかる』をコンセプトに。</p>
</header>

<main style="padding: 0 7vw 14vh; max-width: 1180px; margin: 0 auto; box-sizing: border-box">
  <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px">
    <button class="chip on" data-filter="All">すべて</button>
    <button class="chip" data-filter="Web App">Web App</button>
    <button class="chip" data-filter="Game">Game</button>
  </div>
  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px">
{{WORK_CARDS}}
  </div>

  <section data-reveal style="margin-top: 12vh; padding-top: 8vh; border-top: 1px solid rgba(255,255,255,.1); opacity: calc(var(--r, 0)); transition: opacity 1s ease">
    <p style="margin: 0 0 14px; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45)">Tools — 便利ツール</p>
    <h2 style="margin: 0 0 10px; font: 600 clamp(24px, 3vw, 34px)/1.4 'Noto Serif JP', serif">共有ツール<span style="color: var(--accent, #6f8cff)">。</span></h2>
    <p style="margin: 0 0 32px; font: 300 14px/1.9 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.55)">合言葉つきで、ファイルやリンクを安全に共有できる自作ツールです。</p>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px">
      <a href="/files/" class="wcard" style="display: block; padding: 24px 24px 26px; border: 1px solid rgba(255,255,255,.1); border-radius: 16px; background: #0b0b0f; text-decoration: none; color: #f4f4f5">
        <span style="display: inline-block; margin-bottom: 14px; font: 400 10.5px 'Noto Sans JP', sans-serif; letter-spacing: .12em; padding: 3px 10px; border: 1px solid rgba(111,140,255,.5); border-radius: 999px; color: var(--accent, #6f8cff)">File Share</span>
        <h3 style="margin: 0 0 8px; font: 500 17px 'Noto Sans JP', sans-serif">ファイル共有　→</h3>
        <p style="margin: 0; font: 300 12.5px/1.8 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5)">合言葉を入れて最大2GBのファイルをアップロード。共有用のダウンロードURLが作れます。</p>
      </a>
      <a href="/share/" class="wcard" style="display: block; padding: 24px 24px 26px; border: 1px solid rgba(255,255,255,.1); border-radius: 16px; background: #0b0b0f; text-decoration: none; color: #f4f4f5">
        <span style="display: inline-block; margin-bottom: 14px; font: 400 10.5px 'Noto Sans JP', sans-serif; letter-spacing: .12em; padding: 3px 10px; border: 1px solid rgba(111,140,255,.5); border-radius: 999px; color: var(--accent, #6f8cff)">URL Share</span>
        <h3 style="margin: 0 0 8px; font: 500 17px 'Noto Sans JP', sans-serif">URL共有ページ　→</h3>
        <p style="margin: 0; font: 300 12.5px/1.8 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5)">合言葉を入れると、まとめたリンク集を見られるページ。<a href="/share/edit.html" style="color: rgba(244,244,245,.65)">編集はこちら</a>。</p>
      </a>
    </div>
  </section>
</main>

{{FOOTER}}
<script src="js/site.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+JP:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #060608; color: #f4f4f5; overflow: hidden; position: relative; font-family: 'Noto Serif JP', serif; }
  .glow { position: absolute; left: 50%; top: 58%; width: 900px; height: 500px; transform: translate(-50%, -50%); background: radial-gradient(50% 50% at 50% 50%, rgba(111,140,255,.14), transparent 70%); }
  .wrap { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
  .eyebrow { font: 500 20px 'EB Garamond', serif; letter-spacing: .5em; text-transform: uppercase; color: rgba(244,244,245,.5); padding-left: .5em; }
  h1 { font: 600 104px/1.2 'Noto Serif JP', serif; letter-spacing: .08em; }
  h1 span { color: #6f8cff; }
  .sub { font: italic 400 26px 'EB Garamond', serif; letter-spacing: .12em; color: rgba(244,244,245,.65); }
  .line { width: 64px; height: 1px; background: rgba(255,255,255,.35); }
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <p class="eyebrow">Tsutsumu Funakoshi</p>
  <h1>船越 温<span>。</span></h1>
  <div class="line"></div>
  <p class="sub">Research × Politics × Music × Code</p>
</div>
</body>
</html>

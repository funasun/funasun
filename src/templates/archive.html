<!DOCTYPE html>
<html lang="ja">
<head>
{{HEAD}}
</head>
<body class="p-archive">
<div id="top"></div>
{{NAV}}

<header style="padding: 20vh 7vw 6vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box">
  <p data-reveal style="margin: 0 0 18px; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45); opacity: calc(var(--r, 0)); transition: opacity 1s ease">Archive</p>
  <h1 data-reveal style="margin: 0 0 22px; font: 600 clamp(40px, 5vw, 72px)/1.3 'Noto Serif JP', serif; letter-spacing: .06em; opacity: calc(var(--r, 0)); transform: translateY(calc((1 - var(--r, 0)) * 24px)); transition: opacity 1.1s ease .1s, transform 1.1s ease .1s">活動記録<span style="color: var(--accent, #6f8cff)">。</span></h1>
  <p data-reveal style="margin: 0; font: 300 15px/2 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.6); opacity: calc(var(--r, 0)); transition: opacity 1.2s ease .2s">分野ごとの活動記録。行をクリックで本文が開きます。</p>
</header>

<main style="padding: 0 7vw 14vh; max-width: 1080px; margin: 0 auto; box-sizing: border-box">
  <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px">
    <button class="chip on" data-filter="All">すべて</button>
    <button class="chip" data-filter="Research">Research</button>
    <button class="chip" data-filter="Politics">Politics</button>
    <button class="chip" data-filter="Music">Music</button>
    <button class="chip" data-filter="Leadership">Leadership</button>
  </div>
{{ARCHIVE_SECTIONS}}
</main>

{{FOOTER}}
<script src="js/site.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>船越温/Tsutsumu Funakoshi official website</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Sans+JP:wght@300;400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg:       #f8f7f4;
  --text:     #111111;
  --muted:    #777777;
  --faint:    #bbbbbb;
  --border:   #e0dedd;
  --serif:    'EB Garamond', Georgia, serif;
  --sans:     'Noto Sans JP', sans-serif;
  --serif-jp: 'Noto Serif JP', serif;
  --max:      720px;
  --pad:      2rem;
}
 
html { font-size: 16px; }
 
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}
 
a { color: inherit; text-decoration: none; }
 
/* ── LAYOUT ── */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 var(--pad);
}
 
/* ── NAV ── */
header {
  padding: 3rem var(--pad) 2rem;
  max-width: var(--max);
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 1px solid var(--border);
}
 
.site-name {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  cursor: pointer;
}
 
nav {
  display: flex;
  gap: 2rem;
}
 
nav a {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: color 0.2s;
  border-bottom: 1px solid transparent;
  padding-bottom: 1px;
}
 
nav a:hover { color: var(--text); }
nav a.active {
  color: var(--text);
  border-bottom-color: var(--text);
}
 
/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }
 
/* ── SECTION BASE ── */
.section {
  max-width: var(--max);
  margin: 0 auto;
  padding: 4rem var(--pad) 6rem;
}
 
.section-header {
  margin-bottom: 3.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
 
.section-label {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 1rem;
}
 
.section-title {
  font-family: var(--serif);
  font-size: clamp(1.6rem, 3.5vw, 2.2rem);
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
 
/* ── HOME ── */
#page-home {
  max-width: var(--max);
  margin: 0 auto;
  padding: 5rem var(--pad) 6rem;
}
 
.intro-name {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 2.8rem);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 1.5rem;
  letter-spacing: 0.01em;
}
 
.intro-tagline {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 4rem;
  line-height: 1.9;
  max-width: 520px;
}
 
/* ── HOME NEWS ── */
.home-block {
  margin-bottom: 4rem;
}
 
.home-block-label {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 1.2rem;
}
 
.news-item {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 1.5rem;
  padding: 1rem 0;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
 
.news-item:last-child { border-bottom: 1px solid var(--border); }
.news-item:hover { opacity: 0.6; }
 
.news-date {
  font-family: var(--serif);
  font-size: 0.78rem;
  color: var(--faint);
  padding-top: 0.15rem;
  letter-spacing: 0.04em;
}
 
.news-title {
  font-family: var(--serif-jp);
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
}
 
.news-category {
  font-size: 0.68rem;
  color: var(--faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}
 
/* ── HOME PREVIEW (About / Research) ── */
.preview-block {
  margin-bottom: 2.5rem;
  padding: 1.8rem 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
 
.preview-block:hover { opacity: 0.6; }
 
.preview-block-label {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 0.4rem;
}
 
.preview-block-text {
  font-family: var(--serif-jp);
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.7;
}
 
.preview-arrow {
  font-family: var(--serif);
  font-size: 1.2rem;
  color: var(--faint);
  flex-shrink: 0;
  margin-left: 1.5rem;
}
 
/* ── HOME FEATURED ── */
.featured-item {
  padding: 1.5rem 0;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
 
.featured-item:last-child { border-bottom: 1px solid var(--border); }
.featured-item:hover { opacity: 0.6; }
 
.featured-category {
  font-size: 0.68rem;
  color: var(--faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
 
.featured-title {
  font-family: var(--serif-jp);
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 0.4rem;
}
 
.featured-excerpt {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.8;
  font-family: var(--serif-jp);
  font-weight: 300;
}
 
/* ── ABOUT img in header ── */
#about-img-top { margin: 1.2rem 0; }
#about-img-top:empty { margin: 0; }

/* ── ABOUT ── */
.prose p {
  font-size: 0.92rem;
  line-height: 2.1;
  color: var(--text);
  margin-bottom: 1.6rem;
  font-family: var(--serif-jp);
  font-weight: 300;
}
 
.prose p:last-child { margin-bottom: 0; }
 
.meta-table {
  margin: 3rem 0;
  border-top: 1px solid var(--border);
}
 
.meta-row {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 1.5rem;
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}
 
.meta-row-label {
  color: var(--faint);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding-top: 0.1rem;
}
 
.meta-row-value {
  color: var(--text);
  font-family: var(--serif-jp);
  font-weight: 300;
  line-height: 1.9;
}
 
/* ── ABOUT TIMELINE ── */
.timeline-section {
  margin-top: 3.5rem;
  border-top: 1px solid var(--border);
  padding-top: 2.5rem;
}
 
.timeline-label {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 1.5rem;
}
 
.timeline-item {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 1.5rem;
  padding: 0.9rem 0;
  border-bottom: 1px solid var(--border);
}
 
.timeline-year {
  font-family: var(--serif);
  font-size: 0.78rem;
  color: var(--faint);
  padding-top: 0.1rem;
}
 
.timeline-text {
  font-family: var(--serif-jp);
  font-size: 0.88rem;
  font-weight: 300;
  color: var(--text);
}
 
/* ── RESEARCH ── */
.research-block {
  margin-bottom: 4rem;
}
 
.research-problem {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-style: italic;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 2rem;
  padding-left: 1.2rem;
  border-left: 2px solid var(--border);
}

.research-problem .reveal-line { display: block; }
 
.research-body p {
  font-size: 0.9rem;
  line-height: 2.1;
  color: var(--text);
  margin-bottom: 1.4rem;
  font-family: var(--serif-jp);
  font-weight: 300;
}
 
.keyword-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1.8rem;
}
 
.keyword {
  font-size: 0.72rem;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.25rem 0.7rem;
  border-radius: 2px;
  letter-spacing: 0.06em;
}
 
.awards-section {
  margin-top: 4rem;
  border-top: 1px solid var(--border);
  padding-top: 2.5rem;
}
 
.awards-label {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 2rem;
}
 
.award-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 2rem;
  padding: 1.2rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
 
.award-row:hover { opacity: 0.6; }
 
.award-row.no-link {
  cursor: default;
}
 
.award-row.no-link:hover { opacity: 1; }
 
.award-year {
  font-family: var(--serif);
  font-size: 0.85rem;
  color: var(--faint);
  padding-top: 0.1rem;
}
 
.award-name {
  font-size: 0.88rem;
  color: var(--text);
  font-family: var(--serif-jp);
  font-weight: 300;
  line-height: 1.7;
  margin-bottom: 0.2rem;
}
 
.award-org {
  font-size: 0.75rem;
  color: var(--muted);
}
 
/* ── ARCHIVE ── */
.archive-filter {
  display: flex;
  gap: 0;
  margin-bottom: 2.5rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
 
.filter-btn {
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--faint);
  padding: 0.7rem 1.2rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
 
.filter-btn:hover { color: var(--text); }
.filter-btn.active {
  color: var(--text);
  border-bottom-color: var(--text);
}
 
.archive-list {
  border-top: 1px solid var(--border);
}
 
.archive-item {
  padding: 1.8rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
 
.archive-item:hover { opacity: 0.6; }
 
.archive-item-meta {
  display: flex;
  gap: 1rem;
  align-items: center;
  margin-bottom: 0.6rem;
}
 
.archive-date {
  font-size: 0.72rem;
  color: var(--faint);
  letter-spacing: 0.06em;
  font-family: var(--serif);
}
 
.archive-category {
  font-size: 0.65rem;
  color: var(--faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
}
 
.archive-title {
  font-family: var(--serif-jp);
  font-size: 1rem;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 0.5rem;
  line-height: 1.6;
}
 
.archive-excerpt {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.9;
  font-family: var(--serif-jp);
  font-weight: 300;
}
 
.archive-empty {
  font-size: 0.8rem;
  color: var(--faint);
  text-align: center;
  padding: 4rem 0;
  letter-spacing: 0.1em;
}
 
/* ── ARTICLE ── */
.article-back {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  cursor: pointer;
  margin-bottom: 3rem;
  transition: color 0.2s;
  border: none;
  background: none;
  padding: 0;
}
 
.article-back:hover { color: var(--text); }
 
.article-meta {
  display: flex;
  gap: 1rem;
  align-items: center;
  margin-bottom: 1rem;
}
 
.article-date {
  font-size: 0.72rem;
  color: var(--faint);
  letter-spacing: 0.06em;
  font-family: var(--serif);
}
 
.article-cat {
  font-size: 0.65rem;
  color: var(--faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
}
 
.article-title {
  font-family: var(--serif-jp);
  font-size: clamp(1.4rem, 3vw, 1.9rem);
  font-weight: 300;
  line-height: 1.5;
  margin-bottom: 2.5rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}
 
.article-body p {
  font-family: var(--serif-jp);
  font-size: 0.93rem;
  font-weight: 300;
  line-height: 2.3;
  margin-bottom: 2rem;
}
 
.article-wip {
  font-size: 0.78rem;
  color: var(--faint);
  text-align: center;
  padding: 4rem 0;
  border-top: 1px solid var(--border);
  margin-top: 3rem;
  letter-spacing: 0.1em;
}
 
.article-images {
  margin-top: 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
 
.article-images img {
  width: 100%;
  display: block;
  border: 1px solid var(--border);
}
 
.article-img-caption {
  font-size: 0.72rem;
  color: var(--faint);
  margin-top: 0.4rem;
  letter-spacing: 0.04em;
  font-family: var(--serif-jp);
}
 
/* ── SHARED IMAGE HELPERS ── */
.img-top {
  width: 100%;
  display: block;
  border: 1px solid var(--border);
  margin-bottom: 2.5rem;
}
 
.img-bottom {
  width: 100%;
  display: block;
  border: 1px solid var(--border);
  margin-top: 2rem;
}
 
.img-side-wrap {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 2.5rem;
  align-items: start;
}
 
.img-side-wrap img {
  width: 100%;
  display: block;
  border: 1px solid var(--border);
}
 
.img-caption {
  font-size: 0.72rem;
  color: var(--faint);
  margin-top: 0.4rem;
  letter-spacing: 0.04em;
  font-family: var(--serif-jp);
}
 
.img-block {
  margin-bottom: 1.2rem;
}

.img-row-wrap {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.2rem;
}

.img-row-wrap .img-block {
  flex: 1;
  min-width: 0;
  margin-bottom: 0;
}

@media (max-width: 600px) {
  .img-side-wrap { grid-template-columns: 1fr; }
  .img-row-wrap { flex-direction: column; }
}
 
/* ── CONTACT ── */
.contact-intro {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-style: italic;
  color: var(--muted);
  line-height: 1.9;
  margin-bottom: 3rem;
  max-width: 480px;
}
 
.contact-links {
  border-top: 1px solid var(--border);
}
 
.contact-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
  text-decoration: none;
}
 
.contact-row:hover { opacity: 0.5; }
 
.contact-row-label {
  font-size: 0.83rem;
  color: var(--text);
}
 
.contact-row-arrow {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--faint);
}
 
/* ── FOOTER ── */
footer {
  max-width: var(--max);
  margin: 0 auto;
  padding: 2rem var(--pad) 3rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}
 
footer p {
  font-size: 0.72rem;
  color: var(--faint);
  letter-spacing: 0.04em;
}
 
/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { flex-direction: column; gap: 1.2rem; }
  nav { gap: 1.2rem; flex-wrap: wrap; }
  .news-item { grid-template-columns: 80px 1fr; gap: 1rem; }
  .timeline-item { grid-template-columns: 80px 1fr; gap: 1rem; }
  .award-row { grid-template-columns: 70px 1fr; gap: 1rem; }
  .meta-row { grid-template-columns: 1fr; gap: 0.3rem; }
  footer { flex-direction: column; gap: 0.4rem; }
  .archive-filter { gap: 0; }
  .filter-btn { padding: 0.6rem 0.8rem; }
}
</style>
</head>
<body>
 
<header>
  <span class="site-name" id="site-name" onclick="showPage('home')"></span>
  <nav id="main-nav">
    <a onclick="showPage('home')"    data-page="home">Home</a>
    <a onclick="showPage('about')"   data-page="about">About</a>
    <a onclick="showPage('research')"data-page="research">Research</a>
    <a onclick="showPage('archive')" data-page="archive">Archive</a>
    <a onclick="showPage('contact')" data-page="contact">Contact</a>
  </nav>
</header>
 
<!-- ── HOME ── -->
<div id="page-home" class="page active">
  <div style="max-width:720px;margin:0 auto;padding:5rem 2rem 6rem;">
    <div id="home-img-top"></div>
    <p class="intro-name" id="home-name"></p>
    <p class="intro-tagline" id="home-tagline"></p>
    <div id="home-img-bottom"></div>
 
    <!-- News -->
    <div class="home-block">
      <p class="home-block-label">News</p>
      <div id="home-news"></div>
    </div>
 
    <!-- About Preview -->
    <div class="preview-block" onclick="showPage('about')">
      <div>
        <p class="preview-block-label">About</p>
        <p class="preview-block-text">研究・政治・芸術を守備範囲とする高校生</p>
      </div>
      <span class="preview-arrow">→</span>
    </div>
 
    <!-- Research Preview -->
    <div class="preview-block" onclick="showPage('research')">
      <div>
        <p class="preview-block-label">Research</p>
        <p class="preview-block-text">廃棄うどんを用いた高効率水素生成プロセスの設計と最適化</p>
      </div>
      <span class="preview-arrow">→</span>
    </div>
 
    <!-- Featured -->
    <div class="home-block" style="margin-top:1rem;">
      <p class="home-block-label">Featured</p>
      <div id="home-featured"></div>
    </div>
  </div>
</div>
 
<!-- ── ABOUT ── -->
<div id="page-about" class="page">
  <div class="section">
    <div class="section-header">
      <p class="section-label">About</p>
      <div id="about-img-top"></div>
      <h1 class="section-title" id="about-heading"></h1>
    </div>
    <div id="about-body-wrap">
      <div class="prose" id="about-prose"></div>
    </div>
    <div id="about-img-bottom"></div>
    <div class="meta-table" id="about-meta"></div>
    <div class="timeline-section">
      <p class="timeline-label">Timeline</p>
      <div id="about-timeline"></div>
    </div>
  </div>
</div>
 
<!-- ── RESEARCH ── -->
<div id="page-research" class="page">
  <div class="section">
    <div id="research-img-top"></div>
    <div class="section-header">
      <p class="section-label">Research</p>
      <h1 class="section-title" id="research-heading"></h1>
    </div>
    <div class="research-block">
      <p class="research-problem" id="research-problem"></p>
      <div class="research-body" id="research-body"></div>
      <div class="keyword-list" id="research-keywords"></div>
    </div>
    <div id="research-img-bottom"></div>
    <div class="awards-section">
      <p class="awards-label" id="research-awards-label"></p>
      <div id="research-awards"></div>
    </div>
    <div style="margin-top:3rem; padding-top:2rem; border-top:1px solid var(--border);">
      <p style="font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); margin-bottom:1.5rem;">研究ポスター</p>
      <img src="images/poster.webp" alt="研究ポスター" style="width:100%;">
    </div>
  </div>
</div>
 
<!-- ── ARCHIVE ── -->
<div id="page-archive" class="page">
  <div class="section">
    <div class="section-header">
      <p class="section-label">Archive</p>
      <h1 class="section-title">活動記録</h1>
    </div>
    <div class="archive-filter" id="archive-filter"></div>
    <div class="archive-list" id="archive-list"></div>
  </div>
</div>
 
<!-- ── CONTACT ── -->
<div id="page-contact" class="page">
  <div class="section">
    <div class="section-header">
      <p class="section-label">Contact</p>
      <h1 class="section-title" id="contact-heading"></h1>
    </div>
    <div id="contact-img-top"></div>
    <p class="contact-intro" id="contact-intro"></p>
    <div id="contact-img-bottom"></div>
    <div class="contact-links" id="contact-links"></div>
  </div>
</div>
 
<!-- ── ARTICLE ── -->
<div id="page-article" class="page">
  <div class="section">
    <button class="article-back" id="article-back-btn">← archive</button>
    <div class="article-meta">
      <span class="article-date" id="article-date"></span>
      <span class="article-cat" id="article-cat"></span>
    </div>
    <div id="article-img-top"></div>
    <h1 class="article-title" id="article-title"></h1>
    <div class="article-body" id="article-body"></div>
    <div id="article-img-bottom"></div>
    <p class="article-wip" id="article-wip">この記事は執筆中です。</p>
  </div>
</div>
 
<footer>
  <p id="footer-name"></p>
  <p id="footer-year"></p>
</footer>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
// ── Markdown link parser ──
function parseLinks(text) {
  return text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener" style="color:var(--text);border-bottom:1px solid var(--faint);padding-bottom:1px;">$1</a>');
}

// ── Image renderer ──
function renderImages(imgs, topId, bottomId, sideBodyId) {
  const top    = imgs.filter(i => i.position === 'top');
  const side   = imgs.filter(i => i.position === 'side');
  const bottom = imgs.filter(i => !i.position || i.position === 'bottom');

  const imgBlock = (i) =>
    `<div class="img-block">
      <img src="${i.src}" alt="${i.caption || ''}" style="width:100%;display:block;border:1px solid var(--border);">
      ${i.caption ? `<p class="img-caption">${i.caption}</p>` : ''}
    </div>`;

  const renderGroup = (group, el) => {
    if (!el) return;
    const layout = group.find(i => i.layout)?.layout;
    if (layout === 'row') {
      el.innerHTML = `<div class="img-row-wrap">${group.map(imgBlock).join('')}</div>`;
    } else {
      el.innerHTML = group.map(imgBlock).join('');
    }
  };

  // top
  const topEl = document.getElementById(topId);
  renderGroup(top, topEl);

  // bottom
  const botEl = document.getElementById(bottomId);
  renderGroup(bottom, botEl);
 
  // side (About専用)
  if (sideBodyId && side.length > 0) {
    const wrap = document.getElementById('about-body-wrap');
    if (wrap) {
      wrap.className = 'img-side-wrap';
      const proseEl = document.getElementById(sideBodyId);
      const proseHTML = proseEl ? proseEl.outerHTML : '';
      wrap.innerHTML =
        `<div>${side.map(imgBlock).join('')}</div>` +
        `<div id="${sideBodyId}">${proseEl ? proseEl.innerHTML : ''}</div>`;
    }
  }
}
 
// ── Scroll reveal animations ──
const _reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let _archiveST = [];

function revealNewsItems() {
  const items = document.querySelectorAll('#home-news .news-item');
  if (!items.length) return;
  gsap.from(items, {
    opacity: 0,
    y: 16,
    duration: 0.6,
    ease: 'power2.out',
    stagger: 0.08,
    scrollTrigger: { trigger: '#home-news', start: 'top 85%', once: true }
  });
}

function revealAbout() {
  const img = document.querySelector('#about-img-top img');
  if (img) {
    gsap.from(img, {
      opacity: 0,
      scale: 1.04,
      duration: 0.9,
      ease: 'power2.out',
      scrollTrigger: { trigger: img, start: 'top 85%', once: true }
    });
  }
  const paras = document.querySelectorAll('#about-prose p');
  if (paras.length) {
    gsap.from(paras, {
      opacity: 0,
      y: 14,
      duration: 0.6,
      ease: 'power2.out',
      stagger: 0.12,
      scrollTrigger: { trigger: '#about-prose', start: 'top 85%', once: true }
    });
  }
}

function revealResearchProblem() {
  const el = document.getElementById('research-problem');
  if (!el) return;
  const lines = el.innerHTML.split(/<br\s*\/?>/i).map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return;
  el.innerHTML = lines.map(l => `<span class="reveal-line">${l}</span>`).join('');
  gsap.from(el.querySelectorAll('.reveal-line'), {
    opacity: 0,
    y: 10,
    duration: 0.7,
    ease: 'power2.out',
    stagger: 0.25,
    scrollTrigger: { trigger: el, start: 'top 85%', once: true }
  });
}

function revealArchiveItems() {
  _archiveST.forEach(t => t.kill());
  _archiveST = [];
  const items = document.querySelectorAll('#archive-list .archive-item');
  if (!items.length) return;
  const anim = gsap.fromTo(items,
    { opacity: 0, y: 16 },
    {
      opacity: 1, y: 0,
      duration: 0.5,
      ease: 'power2.out',
      stagger: 0.06,
      scrollTrigger: { trigger: '#archive-list', start: 'top 90%', once: true }
    }
  );
  if (anim.scrollTrigger) _archiveST.push(anim.scrollTrigger);
}

function initScrollReveals() {
  if (_reduceMotion || typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
  gsap.registerPlugin(ScrollTrigger);
  revealNewsItems();
  revealAbout();
  revealResearchProblem();
  revealArchiveItems();
}

function refreshScrollTriggers() {
  if (typeof ScrollTrigger === 'undefined') return;
  requestAnimationFrame(() => ScrollTrigger.refresh());
}

// ── State ──
let _currentFilter = 'All';
let _articleFrom   = 'archive'; // 'archive' | 'home'
 
// ── Navigation ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === name);
  });
  const target = document.getElementById('page-' + name);
  if (target) { target.classList.add('active'); window.scrollTo({ top: 0 }); }
  refreshScrollTriggers();
}
 
// ── Article ──
function showArticle(slug, from) {
  const d   = window._siteData;
  const art = d.archive.articles.find(a => a.slug === slug);
  if (!art) return;
 
  _articleFrom = from || 'archive';
 
  document.getElementById('article-date').textContent  = art.date;
  document.getElementById('article-cat').textContent   = art.category;
  document.getElementById('article-title').textContent = art.title;
  document.getElementById('article-body').innerHTML    = art.body
    ? art.body.split('\n').map(p => `<p>${parseLinks(p)}</p>`).join('')
    : '';
 
  // Images
  renderImages(art.images || [], 'article-img-top', 'article-img-bottom', null);
 
  // article-wip: bodyがあれば非表示
  document.getElementById('article-wip').style.display = art.body ? 'none' : 'block';
 
  // Back button destination
  const backBtn = document.getElementById('article-back-btn');
  if (_articleFrom === 'home') {
    backBtn.textContent = '← home';
    backBtn.onclick = () => showPage('home');
  } else {
    backBtn.textContent = '← archive';
    backBtn.onclick = () => showPage('archive');
  }
 
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === 'archive');
  });
  document.getElementById('page-article').classList.add('active');
  window.scrollTo({ top: 0 });
  refreshScrollTriggers();
}
 
// ── Archive filter ──
function setFilter(cat) {
  _currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderArchiveList();
}
 
function renderArchiveList() {
  const d        = window._siteData;
  const articles = d.archive.articles;
  const filtered = _currentFilter === 'All'
    ? articles
    : articles.filter(a => a.category === _currentFilter);
 
  const container = document.getElementById('archive-list');
  if (filtered.length === 0) {
    container.innerHTML = `<p class="archive-empty">記事はまだありません。</p>`;
    return;
  }
  container.innerHTML = filtered.map(a =>
    `<div class="archive-item" onclick="showArticle('${a.slug}','archive')">
      <div class="archive-item-meta">
        <span class="archive-date">${a.date}</span>
        <span class="archive-category">${a.category}</span>
      </div>
      <p class="archive-title">${a.title}</p>
      <p class="archive-excerpt">${a.excerpt}</p>
    </div>`
  ).join('');
  revealArchiveItems();
}
 
// ── Render ──
function render(d) {
  // Site
  document.title = d.site.title;
  document.getElementById('site-name').textContent   = d.site.name;
  document.getElementById('footer-name').textContent = d.site.name;
  document.getElementById('footer-year').textContent = d.site.footerYear;
 
  // Home name / tagline
  renderImages(d.home.images || [], 'home-img-top', 'home-img-bottom', null);
  document.getElementById('home-name').textContent    = d.home.name;
  document.getElementById('home-tagline').textContent = d.home.tagline;
 
  // Home News — slugからarchive記事を参照
  document.getElementById('home-news').innerHTML = d.home.news.map(ref => {
    const art = d.archive.articles.find(a => a.slug === ref.article);
    if (!art) return '';
    return `<div class="news-item" onclick="showArticle('${art.slug}','home')">
      <span class="news-date">${art.date}</span>
      <div>
        <p class="news-title">${art.title}</p>
        <p class="news-category">${art.category}</p>
      </div>
    </div>`;
  }).join('');
 
  // Home Featured — slugからarchive記事を参照
  document.getElementById('home-featured').innerHTML = d.home.featured.map(ref => {
    const art = d.archive.articles.find(a => a.slug === ref.article);
    if (!art) return '';
    return `<div class="featured-item" onclick="showArticle('${art.slug}','home')">
      <p class="featured-category">${art.category}</p>
      <p class="featured-title">${art.title}</p>
      <p class="featured-excerpt">${art.excerpt}</p>
    </div>`;
  }).join('');
 
  // About
  renderImages(d.about.images || [], 'about-img-top', 'about-img-bottom', 'about-prose');
  document.getElementById('about-heading').textContent = d.about.heading;
  document.getElementById('about-prose').innerHTML     = `<p>${parseLinks(d.about.prose)}</p>`;
  document.getElementById('about-meta').innerHTML      = d.about.meta.map(m =>
    `<div class="meta-row">
      <span class="meta-row-label">${m.label}</span>
      <span class="meta-row-value">${m.value}</span>
    </div>`
  ).join('');
  document.getElementById('about-timeline').innerHTML = d.about.timeline.map(t =>
    `<div class="timeline-item">
      <span class="timeline-year">${t.year}</span>
      <span class="timeline-text">${t.label}</span>
    </div>`
  ).join('');
 
  // Research
  renderImages(d.research.images || [], 'research-img-top', 'research-img-bottom', null);
  document.getElementById('research-heading').innerHTML    = d.research.heading;
  document.getElementById('research-problem').innerHTML    = d.research.problem;
  document.getElementById('research-body').innerHTML       = d.research.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('research-keywords').innerHTML   = d.research.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
  document.getElementById('research-awards-label').textContent = d.research.awardsLabel;
  document.getElementById('research-awards').innerHTML     = d.research.awards.map(a => {
    const hasLink = !!a.article;
    return `<div class="award-row${hasLink ? '' : ' no-link'}"${hasLink ? ` onclick="showArticle('${a.article}','archive')"` : ''}>
      <span class="award-year">${a.year}</span>
      <div>
        <p class="award-name">${a.name}</p>
        <p class="award-org">${a.org}</p>
      </div>
    </div>`;
  }).join('');
 
  // Archive filter buttons
  const categories = ['All', ...d.archive.categories];
  document.getElementById('archive-filter').innerHTML = categories.map(cat =>
    `<button class="filter-btn${cat === 'All' ? ' active' : ''}" data-cat="${cat}" onclick="setFilter('${cat}')">${cat}</button>`
  ).join('');
 
  // Archive list (初期表示)
  renderArchiveList();
 
  // Contact
  renderImages(d.contact.images || [], 'contact-img-top', 'contact-img-bottom', null);
  document.getElementById('contact-heading').textContent = d.contact.heading;
  document.getElementById('contact-intro').textContent   = d.contact.intro;
  document.getElementById('contact-links').innerHTML = d.contact.links.map(l => {
    const arrow   = l.arrow || '';
    const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(arrow);
    const isUrl   = /^https?:\/\//.test(l.url);
    const href    = isEmail ? `mailto:${arrow}` : isUrl ? l.url : '#';
    const attrs   = isUrl ? ' target="_blank" rel="noopener"'
                  : isEmail ? ''
                  : ' onclick="return false;"';
    return `<a class="contact-row" href="${href}"${attrs}>
      <span class="contact-row-label">${l.label}</span>
      <span class="contact-row-arrow">${arrow}</span>
    </a>`;
  }).join('');
}
 
fetch('data.json')
  .then(r => r.json())
  .then(d => {
    window._siteData = d;
    render(d);
    initScrollReveals();
    showPage('home');
  })
  .catch(() => {
    document.body.innerHTML =
      '<div style="padding:4rem 2rem;font-family:sans-serif;color:#777;">' +
      '<p>⚠️ data.json が読み込めません。</p>' +
      '<p style="margin-top:.5rem;font-size:.85rem;">ローカルで確認する場合は <code>npx serve .</code> を使ってください。<br>' +
      'GitHub Pages 上では正常に動作します。</p></div>';
  });
</script>
</body>
</html>

<!DOCTYPE html>
<!-- files/index.html — ファイル共有（ギガファイル便ふう）アップロード画面。
     合言葉を知っている人だけがアップロードでき、共有URLが発行される。
     大きいファイルは分割してアップロードするので GB 級も送れる。 -->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ファイル共有 — 船越温</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#060608">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500&family=Noto+Serif+JP:wght@600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --accent: #6f8cff; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #060608; color: #f4f4f5; -webkit-font-smoothing: antialiased; font-family: 'Noto Sans JP', sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 8vh 24px 14vh; }
  .eyebrow { margin: 0 0 12px; font: 500 12px 'EB Garamond', serif; letter-spacing: .4em; text-transform: uppercase; color: rgba(244,244,245,.45); }
  h1 { margin: 0 0 10px; font: 600 clamp(24px, 3.5vw, 34px)/1.4 'Noto Serif JP', serif; }
  .sub { margin: 0 0 30px; font: 300 13px/1.9 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.55); }
  label { display: block; margin: 22px 0 8px; font: 500 12px 'Noto Sans JP', sans-serif; letter-spacing: .1em; color: rgba(244,244,245,.65); }
  .hint { font-weight: 300; color: rgba(244,244,245,.4); letter-spacing: 0; }
  input, select { width: 100%; font: 400 14px 'Noto Sans JP', sans-serif; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,.2); background: #0c0c11; color: #f4f4f5; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .drop { margin-top: 8px; padding: 34px 20px; border: 1.5px dashed rgba(255,255,255,.24); border-radius: 14px; background: #0a0a0e; text-align: center; cursor: pointer; transition: border-color .2s ease, background .2s ease; }
  .drop.over { border-color: var(--accent); background: #0d0d16; }
  .drop p { margin: 6px 0 0; font: 300 12.5px 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5); }
  .drop .pick { font: 500 14px 'Noto Sans JP', sans-serif; color: #f4f4f5; }
  .filename { margin-top: 10px; font: 400 13px 'Noto Sans JP', sans-serif; color: var(--accent); word-break: break-all; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 26px; }
  button { font: 400 14px 'Noto Sans JP', sans-serif; letter-spacing: .06em; padding: 12px 28px; border-radius: 999px; cursor: pointer; border: 1px solid var(--accent); background: var(--accent); color: #060608; transition: opacity .2s ease; }
  button:hover { opacity: .88; }
  button:disabled { opacity: .4; cursor: default; }
  .bar { margin-top: 20px; height: 8px; border-radius: 999px; background: rgba(255,255,255,.1); overflow: hidden; display: none; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .2s ease; }
  .msg { margin: 14px 0 0; font: 400 13px 'Noto Sans JP', sans-serif; min-height: 20px; }
  .msg.err { color: #ff8a8a; } .msg.ok { color: #86efac; } .msg.info { color: rgba(244,244,245,.55); }
  .result { display: none; margin-top: 26px; padding: 20px; border: 1px solid rgba(111,140,255,.4); border-radius: 14px; background: #0b0b12; }
  .result .u { display: flex; gap: 10px; margin-top: 10px; }
  .result input { font-size: 13px; }
  .result .note { margin: 14px 0 0; font: 300 12px/1.8 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5); }
  .back { display: inline-block; margin-top: 40px; font: 300 12.5px 'Noto Sans JP', sans-serif; color: rgba(244,244,245,.5); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">File Share — ファイル共有</p>
  <h1>ファイルを送る</h1>
  <p class="sub">合言葉を入れてファイルを選ぶと、共有用のダウンロードURLが作られます。大きいファイル（最大2GB）も送れます。期限が来たら自動で消えます。</p>

  <label>アップロード用の合言葉 <span class="hint">（船越から共有された合言葉）</span></label>
  <input id="code" type="password" autocomplete="off" placeholder="合言葉">

  <label>ファイル</label>
  <div id="drop" class="drop">
    <span class="pick">ここにドラッグ、またはクリックして選択</span>
    <p>最大 2GB</p>
    <div id="fname" class="filename"></div>
  </div>
  <input id="file" type="file" style="display:none">

  <label>有効期限</label>
  <select id="expiry">
    <option value="1">1日で消える</option>
    <option value="3">3日で消える</option>
    <option value="7" selected>7日で消える</option>
    <option value="30">30日で消える</option>
  </select>

  <label>ダウンロード合言葉 <span class="hint">（任意・ダウンロードする人に必要）</span></label>
  <input id="dlpw" type="text" autocomplete="off" placeholder="空ならURLだけでダウンロード可">

  <div class="row">
    <button id="btn-up" type="button">アップロード</button>
  </div>

  <div id="bar" class="bar"><i id="bar-i"></i></div>
  <p id="msg" class="msg" role="status" aria-live="polite"></p>

  <div id="result" class="result">
    <span style="font:500 12px 'Noto Sans JP',sans-serif; letter-spacing:.1em; color:rgba(244,244,245,.65)">共有URL（この2つを相手に伝える）</span>
    <div class="u">
      <input id="rurl" type="text" readonly>
      <button id="copy" type="button" style="padding:12px 18px">コピー</button>
    </div>
    <p id="rnote" class="note"></p>
  </div>

  <a href="/" class="back">← サイトトップへ戻る</a>
</div>

<script>
(function () {
  var WORKER_URL = 'https://funasun-files.takakouseitokai.workers.dev';

  var $ = function (id) { return document.getElementById(id); };
  var fileInput = $('file');
  var drop = $('drop');
  var msg = $('msg');
  var bar = $('bar');
  var barI = $('bar-i');
  var btn = $('btn-up');
  var chosen = null;

  function setMsg(t, c) { msg.textContent = t; msg.className = 'msg' + (c ? ' ' + c : ''); }

  function pickFile(f) {
    chosen = f || null;
    $('fname').textContent = f ? (f.name + '（' + humanSize(f.size) + '）') : '';
  }
  function humanSize(n) {
    if (n < 1024) return n + ' B';
    var u = ['KB', 'MB', 'GB', 'TB'], i = -1;
    do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
    return n.toFixed(n >= 10 || i === 0 ? 0 : 1) + ' ' + u[i];
  }
  async function sha256hex(s) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.prototype.map.call(new Uint8Array(buf), function (b) { return ('0' + b.toString(16)).slice(-2); }).join('');
  }

  drop.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function () { pickFile(fileInput.files[0]); });
  ['dragenter', 'dragover'].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.add('over'); });
  });
  ['dragleave', 'drop'].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.remove('over'); });
  });
  drop.addEventListener('drop', function (e) {
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) pickFile(e.dataTransfer.files[0]);
  });

  btn.addEventListener('click', async function () {
    var code = $('code').value.trim();
    if (!code) { setMsg('アップロード用の合言葉を入力してください。', 'err'); return; }
    if (!chosen) { setMsg('ファイルを選んでください。', 'err'); return; }
    if (chosen.size > 2 * 1024 * 1024 * 1024) { setMsg('ファイルが大きすぎます（上限2GB）。', 'err'); return; }

    btn.disabled = true;
    $('result').style.display = 'none';
    bar.style.display = 'block';
    barI.style.width = '0%';
    setMsg('準備中…', 'info');

    try {
      var pwHash = '';
      if ($('dlpw').value) pwHash = await sha256hex($('dlpw').value);

      var res = await fetch(WORKER_URL + '/create', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          code: code, filename: chosen.name, size: chosen.size,
          contentType: chosen.type || 'application/octet-stream',
          expiryDays: Number($('expiry').value), pwHash: pwHash
        })
      });
      var cj = await res.json();
      if (!res.ok) throw new Error(cj.message || 'アップロードを開始できませんでした');

      var partSize = cj.partSize;
      var total = chosen.size;
      var shareUrl = '';
      for (var offset = 0; offset < total; offset += partSize) {
        var end = Math.min(offset + partSize, total);
        var chunk = chosen.slice(offset, end);
        var pr = await fetch(WORKER_URL + '/part?session=' + encodeURIComponent(cj.sessionUri) +
          '&start=' + offset + '&end=' + end + '&total=' + total, {
          method: 'PUT', body: chunk
        });
        var pj = await pr.json();
        if (!pr.ok) throw new Error(pj.message || 'アップロード中にエラーが発生しました');
        if (pj.done) shareUrl = pj.url;
        barI.style.width = Math.round(end / total * 100) + '%';
        setMsg('アップロード中… ' + Math.round(end / total * 100) + '%', 'info');
      }

      if (!shareUrl) throw new Error('保存の確定に失敗しました');

      setMsg('完了しました。', 'ok');
      $('rurl').value = shareUrl;
      $('rnote').textContent = $('dlpw').value
        ? 'この URL と「ダウンロード合言葉」を相手に伝えてください。' + $('expiry').selectedOptions[0].text + '。'
        : 'この URL を相手に伝えてください。' + $('expiry').selectedOptions[0].text + '。';
      $('result').style.display = 'block';
      pickFile(null); fileInput.value = '';
    } catch (e) {
      setMsg(e.message || '失敗しました。もう一度お試しください。', 'err');
    } finally {
      btn.disabled = false;
      setTimeout(function () { bar.style.display = 'none'; }, 800);
    }
  });

  $('copy').addEventListener('click', function () {
    $('rurl').select();
    try { navigator.clipboard.writeText($('rurl').value); } catch (e) { document.execCommand('copy'); }
    $('copy').textContent = 'コピー済';
    setTimeout(function () { $('copy').textContent = 'コピー'; }, 1500);
  });
})();
</script>
</body>
</html>
